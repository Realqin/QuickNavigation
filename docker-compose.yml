services:
  mysql:
    image: mysql:8.0
    container_name: quicknav-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: quicknavigation
      MYSQL_USER: quicknav
      MYSQL_PASSWORD: quicknav123
    ports:
      - "3309:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uquicknav", "-pquicknav123"]
      interval: 5s
      timeout: 5s
      retries: 20

  omnidb:
    build: ./docker/omnidb
    container_name: quicknav-omnidb
    restart: unless-stopped
    environment:
      OMNIDB_ADMIN_USER: admin
      OMNIDB_ADMIN_PASSWORD: admin@123
    ports:
      - "8081:8000"
      - "25482:25482"
    volumes:
      - omnidb_data:/home/omnidb/.omnidb/omnidb-server

  sshwifty-app:
    image: niruix/sshwifty:latest
    container_name: quicknav-sshwifty-app
    restart: unless-stopped
    environment:
      SSHWIFTY_SHAREDKEY: ""
      SSHWIFTY_HOSTNAME: ""
    expose:
      - "8182"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sshwifty:
    build: ./docker/sshwifty
    container_name: quicknav-sshwifty
    restart: unless-stopped
    depends_on:
      - sshwifty-app
    ports:
      - "8182:8182"

  backend:
    build: ./backend
    container_name: quicknav-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://quicknav:quicknav123@mysql:3306/quicknavigation
      CORS_ORIGINS: "*"
      GITHUB_WEBHOOK_SECRET: change-me-github-secret
      GITHUB_TOKEN: ""
      GITLAB_WEBHOOK_SECRET: change-me-gitlab-secret
      GITLAB_TOKEN: ""
      GITLAB_BASE_URL: http://gitlab.bj.uniseas.com.cn
      PUBLIC_WEBHOOK_BASE_URL: http://192.168.6.127:8080
      SCHEMA_MONITOR_INTERVAL_SECONDS: 300
      OMNIDB_INTERNAL_URL: http://omnidb:8000
      OMNIDB_PUBLIC_PORT: 8081
      OMNIDB_ADMIN_USER: admin
      OMNIDB_ADMIN_PASSWORD: admin@123
      OMNIDB_MYSQL_HOST: mysql
      OMNIDB_DB_PATH: /omnidb-data/omnidb.db
      SSHWIFTY_PUBLIC_PORT: 8182
      SSHWIFTY_SSH_HOST: host.docker.internal
    volumes:
      - omnidb_data:/omnidb-data
    depends_on:
      mysql:
        condition: service_healthy
      omnidb:
        condition: service_started
      sshwifty:
        condition: service_started
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: quicknav-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mysql_data:
  omnidb_data:
