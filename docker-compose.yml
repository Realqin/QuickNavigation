services:
  mysql:
    image: mysql:8.0
    container_name: quicknav-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: quicknavigation
      MYSQL_USER: quicknav
      MYSQL_PASSWORD: quicknav123
    ports:
      - "3309:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uquicknav", "-pquicknav123"]
      interval: 5s
      timeout: 5s
      retries: 20

  omnidb-app:
    build: ./docker/omnidb
    container_name: quicknav-omnidb-app
    restart: unless-stopped
    environment:
      OMNIDB_ADMIN_USER: admin
      OMNIDB_ADMIN_PASSWORD: admin@123
    expose:
      - "8000"
    ports:
      - "25482:25482"
    volumes:
      - omnidb_data:/home/omnidb/.omnidb/omnidb-server

  omnidb:
    build: ./docker/omnidb-proxy
    container_name: quicknav-omnidb
    restart: unless-stopped
    depends_on:
      - omnidb-app
    ports:
      - "8081:8081"

  sshwifty-app:
    image: niruix/sshwifty:latest
    container_name: quicknav-sshwifty-app
    restart: unless-stopped
    environment:
      SSHWIFTY_SHAREDKEY: ""
      SSHWIFTY_HOSTNAME: ""
    expose:
      - "8182"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sshwifty:
    build: ./docker/sshwifty
    container_name: quicknav-sshwifty
    restart: unless-stopped
    depends_on:
      - sshwifty-app
    ports:
      - "8182:8182"

  redpanda-console:
    build: ./docker/redpanda
    container_name: quicknav-redpanda-console
    restart: unless-stopped
    ports:
      - "8082:8080"
    volumes:
      - ./docker/redpanda/data:/config
    environment:
      CONFIG_FILEPATH: /config/console-config.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redisinsight-app:
    image: redis/redisinsight:latest
    container_name: quicknav-redisinsight-app
    restart: unless-stopped
    environment:
      RI_ACCEPT_TERMS_AND_CONDITIONS: "true"
    expose:
      - "5540"
    volumes:
      - redisinsight_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redisinsight:
    build: ./docker/redisinsight-proxy
    container_name: quicknav-redisinsight
    restart: unless-stopped
    depends_on:
      - redisinsight-app
    ports:
      - "5540:5540"

  backend:
    build: ./backend
    container_name: quicknav-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://quicknav:quicknav123@mysql:3306/quicknavigation
      CORS_ORIGINS: "*"
      GITHUB_WEBHOOK_SECRET: change-me-github-secret
      GITHUB_TOKEN: ""
      GITLAB_WEBHOOK_SECRET: change-me-gitlab-secret
      GITLAB_TOKEN: ""
      GITLAB_BASE_URL: http://gitlab.bj.uniseas.com.cn
      PUBLIC_WEBHOOK_BASE_URL: http://192.168.6.127:8080
      SCHEMA_MONITOR_INTERVAL_SECONDS: 300
      OMNIDB_INTERNAL_URL: http://omnidb-app:8000
      OMNIDB_PUBLIC_PORT: 8081
      OMNIDB_ADMIN_USER: admin
      OMNIDB_ADMIN_PASSWORD: admin@123
      OMNIDB_MYSQL_HOST: mysql
      OMNIDB_DB_PATH: /omnidb-data/omnidb.db
      SSHWIFTY_PUBLIC_PORT: 8182
      SSHWIFTY_SSH_HOST: host.docker.internal
      REDPANDA_PUBLIC_PORT: 8082
      REDPANDA_KAFKA_HOST: host.docker.internal
      REDPANDA_CONFIG_PATH: /config/console-config.yml
      REDPANDA_CLUSTERS_MANIFEST_PATH: /config/clusters-manifest.yml
      REDPANDA_RELOAD_WAIT_SECONDS: 3
      REDISINSIGHT_INTERNAL_URL: http://redisinsight-app:5540
      REDISINSIGHT_PUBLIC_PORT: 5540
      REDISINSIGHT_REDIS_HOST: host.docker.internal
    volumes:
      - omnidb_data:/omnidb-data
      - ./docker/redpanda/data:/config
    depends_on:
      mysql:
        condition: service_healthy
      omnidb-app:
        condition: service_started
      omnidb:
        condition: service_started
      sshwifty:
        condition: service_started
      redpanda-console:
        condition: service_started
      redisinsight-app:
        condition: service_started
      redisinsight:
        condition: service_started
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: quicknav-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mysql_data:
  omnidb_data:
  redisinsight_data:
