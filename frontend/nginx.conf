# 本地默认使用 Redpanda Console 反代配置。
# Docker 构建时由 docker-entrypoint.sh 按 KAFKA_CONSOLE_PROVIDER 选择：
#   - nginx.redpanda.conf  → redpanda-console
#   - nginx.kafka-ui.conf  → kafka-ui（线上 ARM）
# 详见项目根目录 .env.example

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $backend_upstream backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://$backend_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /webhooks/ {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ws/ {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /health {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream$request_uri;
    }

    location /proxy/kafka/ {
        rewrite ^/proxy/kafka/?(.*)$ /$1 break;
        proxy_pass http://redpanda-console:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_buffering off;
    }
}
